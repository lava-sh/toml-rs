[build-system]
requires = ["maturin == 1.13.1"]
build-backend = "maturin"

[tool.maturin]
python-source = "py-src"
module-name = "toml_rs._toml_rs"
pgo-command = "python benchmark/pgo.py"

[project]
name = "toml-rs"
dynamic = ["version"]
requires-python = ">=3.10"
description = "A High-Performance TOML Parser for Python written in Rust"
readme = "README.md"
license = "Unlicense"
license-files = ["UNLICENSE"]
authors = [
    { name = "chirizxc", email = "chirizxc@proton.me" }
]
maintainers = [
    { name = "chirizxc", email = "chirizxc@proton.me" }
]
classifiers = [
    "Typing :: Typed",
    "Programming Language :: Rust",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Programming Language :: Python :: Implementation :: PyPy",
    "Programming Language :: Python :: Implementation :: CPython",
    "Topic :: Software Development :: Libraries",
]

[dependency-groups]
typos = ["typos == 1.45.1"]
zizmor = ["zizmor == 1.24.1"]
rumdl = ["rumdl == 0.1.72"]
maturin = ["maturin == 1.13.1"]
pytest = ["pytest == 9.0.3"]
tomli-w = ["tomli-w == 1.2.0"]
nox = [
    { include-group = "pytest" },
    { include-group = "tomli-w" },
]
ci = [
    "ty == 0.0.31",
    "ruff == 0.15.10",
    "nox == 2026.4.10",
    { include-group = "nox" },
    { include-group = "maturin" },
]
dev = [
    { include-group = "ci" },
    { include-group = "nox" },
    { include-group = "typos" },
    { include-group = "rumdl" },
    { include-group = "zizmor" },
]
bench = [
    "pytomlpp",
    "toml",
    "tomlkit",
    "qtoml",
    "rtoml",
    "tomli ; python_version<'3.11'",
    "tomli-w",
    "polars == 1.39.3",
    "altair == 6.0.0",
    "vl-convert-python == 1.9.0.post1",
    "py-cpuinfo == 9.0.0",
]

[project.urls]
Source = "https://github.com/lava-sh/toml-rs"
Homepage = "https://github.com/lava-sh/toml-rs"
"Bug Tracker" = "https://github.com/lava-sh/toml-rs/issues"
