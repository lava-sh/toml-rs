[package]
name = "toml-rs"
version = "0.3.4"
edition = "2024"
license = "Unlicense"
repository = "https://github.com/lava-sh/toml-rs"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html
[lib]
name = "_toml_rs"
crate-type = ["cdylib"]

[dependencies]
pyo3 = { version = "=0.28.2", features = [
    "extension-module",
    "generate-import-lib",
    "num-bigint",
] }
memchr = "=2.8.0"
rustc-hash = "=2.1.1"
num-bigint = "=0.4.6"
smallvec = "=2.0.0-alpha.12"
bytecount = { version = "=0.6.9", features = ["runtime-dispatch-simd"] }

[dependencies.mimalloc]
optional = true
version = "=0.1.48"
features = [
    # mimalloc v3
    # See: https://github.com/microsoft/mimalloc/tree/dev3?tab=readme-ov-file#branches
    "v3",
    "override",
    "local_dynamic_tls",
]

[dependencies.lexical-core]
git = "https://github.com/Alexhuszagh/rust-lexical"
rev = "59382e249f8fd0dd384ed1f180b38d168cf9fcbb"
default-features = false
features = [
    "radix",
    "parse-floats",
    "parse-integers",
]

###########################################################
#                   TOML v1.0.0 support                   #
# https://github.com/lava-sh/toml/tree/for_python_toml_rs #
###########################################################
[dependencies.toml_v1]
git = "https://github.com/lava-sh/toml"
rev = "dbabedc01d10ffd69900ef75cfef992991b52a5b"
features = [
    "fast_hash", # uses `foldhash`
    "unbounded", # disables default recursion limit
    "preserve_order", # save order
]

[dependencies.toml_parser_v1]
git = "https://github.com/lava-sh/toml"
rev = "dbabedc01d10ffd69900ef75cfef992991b52a5b"
features = [
    "std",
    "simd",
    "unsafe",
]

[dependencies.toml_edit_v1]
git = "https://github.com/lava-sh/toml"
rev = "dbabedc01d10ffd69900ef75cfef992991b52a5b"
features = [
    "serde",
    "unbounded",
]

##############################################################
#                    TOML v1.1.0 support                     #
# https://github.com/lava-sh/toml/tree/python_toml_rs_v1.1.0 #
##############################################################
[dependencies.toml]
git = "https://github.com/lava-sh/toml"
rev = "e74064df12929a6152423f93dde35b34891eaa64"
features = [
    "fast_hash", # uses `foldhash`
    "unbounded", # disables default recursion limit
    "preserve_order", # save order
]

[dependencies.toml_parser]
git = "https://github.com/lava-sh/toml"
rev = "e74064df12929a6152423f93dde35b34891eaa64"
features = [
    "std",
    "simd",
    "unsafe",
]

[dependencies.toml_edit]
git = "https://github.com/lava-sh/toml"
rev = "e74064df12929a6152423f93dde35b34891eaa64"
features = [
    "serde",
    "unbounded",
]

[features]
default = []
mimalloc = ["dep:mimalloc"]

[profile.release]
lto = "fat"
strip = "symbols"
codegen-units = 1

[lints]
rust.warnings = { level = "deny" }
clippy.perf = { level = "deny", priority = -1 }
clippy.style = { level = "warn", priority = -1 }
clippy.pedantic = { level = "warn", priority = -1 }

clippy.let_and_return = "allow" # sometimes good to name what you are returning
clippy.too_many_lines = "allow"
clippy.similar_names = "allow"
