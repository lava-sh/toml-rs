[package]
name = "toml-rs"
version = "0.3.10"
edition = "2024"
license = "Unlicense"
repository = "https://github.com/lava-sh/toml-rs"

[lib]
name = "_toml_rs"
crate-type = ["cdylib"]

[dependencies]
pyo3 = { version = "=0.28.3", features = [
    "extension-module",
    "generate-import-lib",
    "num-bigint",
] }
memchr = "=2.8.0"
rustc-hash = "=2.1.2"
num-bigint = "=0.4.6"
smallvec = "=2.0.0-alpha.12"
bytecount = { version = "=0.6.9", features = ["runtime-dispatch-simd"] }

[dependencies.lexical-core]
git = "https://github.com/Alexhuszagh/rust-lexical"
rev = "afb2efa651f42f63415a3bf3d51ced6143132b2b"
default-features = false
features = [
    "radix",
    "parse-floats",
    "parse-integers",
]

###########################################################
#                   TOML v1.0.0 support                   #
# https://github.com/lava-sh/toml/tree/for_python_toml_rs #
###########################################################
[dependencies.toml_v1]
git = "https://github.com/lava-sh/toml"
rev = "b1581597f0fc10c0cc61faa03a3668b8f49e23f3"
features = [
    "fast_hash", # uses `foldhash`
    "unbounded", # disables default recursion limit
    "preserve_order", # save order
]

[dependencies.toml_parser_v1]
git = "https://github.com/lava-sh/toml"
rev = "b1581597f0fc10c0cc61faa03a3668b8f49e23f3"
features = [
    "std",
    "simd",
    "unsafe",
]

[dependencies.toml_edit_v1]
git = "https://github.com/lava-sh/toml"
rev = "b1581597f0fc10c0cc61faa03a3668b8f49e23f3"
features = [
    "serde",
    "unbounded",
]

##############################################################
#                    TOML v1.1.0 support                     #
# https://github.com/lava-sh/toml/tree/python_toml_rs_v1.1.0 #
##############################################################
[dependencies.toml]
git = "https://github.com/lava-sh/toml"
rev = "c56a2685a9ef706c2d1e32a05f86c60104b14072"
features = [
    "fast_hash", # uses `foldhash`
    "unbounded", # disables default recursion limit
    "preserve_order", # save order
]

[dependencies.toml_parser]
git = "https://github.com/lava-sh/toml"
rev = "c56a2685a9ef706c2d1e32a05f86c60104b14072"
features = [
    "std",
    "simd",
    "unsafe",
]

[dependencies.toml_edit]
git = "https://github.com/lava-sh/toml"
rev = "c56a2685a9ef706c2d1e32a05f86c60104b14072"
features = [
    "serde",
    "unbounded",
]

[dependencies.mimalloc]
optional = true
# version = "=0.1.48"
git = "https://github.com/bluecatengineering/mimalloc_rust"
rev = "8b86a87995e0c2d2fd11e2a15c7f26bc74005d74"
package = "bc-mimalloc"
features = [
    # mimalloc v3
    # See: https://github.com/microsoft/mimalloc/tree/dev3?tab=readme-ov-file#branches
    "v3",
    "override",
    "local_dynamic_tls",
]

[dependencies.snmalloc-rs]
optional = true
version = "=0.7.4"
features = [
    "lto",
    "build_cc",
    "native-cpu",
    "local_dynamic_tls",
]

[features]
default = []
mimalloc = ["dep:mimalloc"]
snmalloc = ["dep:snmalloc-rs"]

[profile.release]
lto = "fat"
panic = "abort"
strip = "symbols"
codegen-units = 1

[lints]
rust.warnings = { level = "deny" }
clippy.perf = { level = "deny", priority = -1 }
clippy.style = { level = "warn", priority = -1 }
clippy.pedantic = { level = "warn", priority = -1 }

clippy.let_and_return = "allow" # sometimes good to name what you are returning
clippy.too_many_lines = "allow"
clippy.similar_names = "allow"
