name: "windows"

on:
  workflow_call:

env:
  UV_LINK_MODE: copy

jobs:
  windows:
    name: "${{ matrix.platform.runner }} / ${{ matrix.platform.target }} / ${{ matrix.platform.interpreter }}"
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - {
            # AMD64
            runner: windows-latest,
            target: x64,
            python-arch: x64,
            maturin-build-args: "--pgo --features mimalloc",
          }
          - {
            # x86
            runner: windows-latest,
            target: x86,
            python-arch: x86,
            maturin-build-args: "--pgo --features mimalloc",
          }
          - {
            # ARM64
            runner: windows-11-arm,
            target: aarch64,
            python-arch: arm64,
            maturin-build-args: "--features mimalloc",
          }
        interpreter: [
          "3.10",
          "3.11",
          "3.12",
          "3.13",
          "3.14",
          "3.13t",
          "3.14t",
        ]
        include:
          - platform: { runner: windows-latest, target: x64 }
            interpreter: "pypy3.11"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: "Install uv"
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: ${{ !startsWith(github.ref, 'refs/tags/') }} # zizmor: ignore[cache-poisoning]

      - name: "Build wheels"
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          target: ${{ matrix.platform.target }}
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }} # zizmor: ignore[cache-poisoning]
          args: >
            --release
            --out dist
            --interpreter ${{ matrix.platform.interpreter }}
            ${{ matrix.platform.maturin-build-args }}
            --compatibility pypi

      - name: "Upload wheels"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-windows-${{ matrix.platform.target }}
          path: dist
