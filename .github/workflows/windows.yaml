name: "Windows"

on:
  workflow_call:

env:
  UV_LINK_MODE: copy
  #
  (^_^): &interpreters            "3.10 3.11 3.12 3.13 3.14 3.14t 3.15 3.15t pypy3.11"
  ○_○: &interpreters_without_pypy "3.10 3.11 3.12 3.13 3.14 3.14t 3.15 3.15t"
  #
  \^_^\: &is_pull_request ${{ github.event_name == 'pull_request' }}

jobs:
  windows:
    name: "${{ matrix.platform.runner }} / ${{ matrix.platform.target }}"
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        # See: https://docs.github.com/en/actions/reference/runners/github-hosted-runners
        platform:
          - {
            # AMD64
            runner: windows-latest,
            target: x86_64-pc-windows-msvc,
            interpreter: *interpreters,
            maturin-build-args: "--features mimalloc",
            use-pgo: true,
          }
          - {
            # x86 (32-bit)
            runner: windows-latest,
            target: i686-pc-windows-msvc,
            interpreter: *interpreters_without_pypy,
            maturin-build-args: "--features mimalloc",
            use-pgo: true,
          }
          - {
            # ARM64
            runner: windows-11-vs2026-arm,
            target: aarch64-pc-windows-msvc,
            interpreter: *interpreters_without_pypy,
            maturin-build-args: "--features mimalloc",
          }

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: "Install uv"
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          enable-cache: *is_pull_request

      - name: "Build wheels"
        if: matrix.platform.use-pgo != true
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          target: ${{ matrix.platform.target }}
          sccache: *is_pull_request
          args: >-
            --release
            --out dist
            --interpreter ${{ matrix.platform.interpreter }}
            ${{ matrix.platform.maturin-build-args || '' }}
            --compatibility pypi

      - name: "Install Rust stable + llvm-tools-preview"
        if: matrix.platform.use-pgo == true
        id: rust-toolchain
        uses: dtolnay/rust-toolchain@stable # zizmor: ignore[unpinned-uses]
        with:
          components: llvm-tools-preview

      - name: "Build PGO wheel"
        if: matrix.platform.use-pgo == true
        uses: ./.github/actions/build-pgo-wheel
        with:
          target: ${{ matrix.platform.target }}
          interpreter: ${{ matrix.platform.interpreter }}
          rust-toolchain: ${{ steps.rust-toolchain.outputs.name }}
          maturin-build-args: ${{ matrix.platform.maturin-build-args || '' }}

      - name: "Upload wheels"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-windows-${{ matrix.platform.target }}
          path: dist
