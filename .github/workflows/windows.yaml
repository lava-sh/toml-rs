name: "windows"

on:
  workflow_call:

env:
  UV_LINK_MODE: copy
  UV_PYTHON_DOWNLOADS: 0

jobs:
  windows:
    name: "${{ matrix.platform.runner }} / ${{ matrix.platform.target }}"
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - {
            # AMD64
            runner: windows-latest,
            target: x64,
            python_arch: x64,
            interpreter: "3.10 3.11 3.12 3.13 3.14 3.13t 3.14t pypy3.11",
            pgo: true
          }
          - {
            # x86
            runner: windows-latest,
            target: x86,
            python_arch: x86,
            interpreter: "3.10 3.11 3.12 3.13 3.14 3.13t 3.14t",
            pgo: true
          }
          - {
            # ARM64
            runner: windows-11-arm,
            target: aarch64,
            python_arch: arm64,
            interpreter: "3.10 3.11 3.12 3.13 3.14 3.13t 3.14t",
            pgo: false
          }

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: "Prepare Python versions"
        id: python-versions
        shell: pwsh
        env:
          INTERPRETERS: ${{ matrix.platform.interpreter }}
        run: |
          $versions = $env:INTERPRETERS.Split(' ', [System.StringSplitOptions]::RemoveEmptyEntries) -join "`n"

          "versions<<EOF" >> $env:GITHUB_OUTPUT
          $versions >> $env:GITHUB_OUTPUT
          "EOF" >> $env:GITHUB_OUTPUT

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          architecture: ${{ matrix.platform.python_arch }}
          python-version: |
            ${{ steps.python-versions.outputs.versions }}

      - name: "Install uv"
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: ${{ !startsWith(github.ref, 'refs/tags/') }} # zizmor: ignore[cache-poisoning]

      - name: "Install llvm-tools"
        if: ${{ matrix.platform.pgo }}
        shell: pwsh
        run: rustup component add llvm-tools

      - name: "Install maturin"
        if: ${{ matrix.platform.pgo }}
        shell: pwsh
        run: uv pip install --group maturin --system

      - name: "Resolve llvm-profdata"
        if: ${{ matrix.platform.pgo }}
        id: llvm
        shell: pwsh
        run: |
          $sysroot = rustc --print sysroot
          $rustc_verbose = rustc -vV
          $host_line = $rustc_verbose | Select-String '^host: '
          $host = $host_line.ToString().Substring(6)
          $llvm_profdata = Join-Path $sysroot "lib\rustlib\$host\bin\llvm-profdata.exe"

          "path=$llvm_profdata" >> $env:GITHUB_OUTPUT

      - name: "Build wheels with manual PGO"
        if: ${{ matrix.platform.pgo }}
        shell: pwsh
        env:
          INTERPRETERS: ${{ matrix.platform.interpreter }}
          PYTHON_ARCH: ${{ matrix.platform.python_arch }}
          LLVM_PROFDATA: ${{ steps.llvm.outputs.path }}
        run: |
          python .github/scripts/build_with_pgo.py --interpreters "${env:INTERPRETERS}" --python-arch "${env:PYTHON_ARCH}" --llvm-profdata "${env:LLVM_PROFDATA}"

      - name: "Build wheels"
        if: ${{ !matrix.platform.pgo }}
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          target: ${{ matrix.platform.target }}
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }} # zizmor: ignore[cache-poisoning]
          args: >
            --release
            --out dist
            --interpreter ${{ matrix.platform.interpreter }}
            --features mimalloc
            --compatibility pypi

      - name: "Upload wheels"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-windows-${{ matrix.platform.target }}
          path: dist
