target-version = "py310"

line-length = 90

include = [
    "py-src/**.py",
    "py-src/**.pyi",
    "tests/**.py",
    "benchmark/**.py",
    "noxfile.py",
    "pyproject.toml",
    "README.md",
]

[lint.isort]
force-wrap-aliases = true
combine-as-imports = true
no-lines-before = ["local-folder"]
extra-standard-library = ["tomllib"]

[lint]
preview = true

select = ["ALL"]
ignore = [
    "ARG",     # Unused method argument
    "D",       # Docstring's
    ########
    "CPY001",  # Check copyright notices within Python files
    "S311",    # Force `random` -> `secrets`
    "ANN401",  # Check `typing.Any`
    "SIM105",  # Force `try-except-pass` -> `contextlib.suppress`
    #######
    "PLR6201", # Checks for membership tests on list and tuple literals.
    "PTH207",  # Force `glob` -> `Path.glob` or `Path.rglob`
    ########
    "TC001",   # \
    "TC002",   #  ==> `typing.TYPE_CHECKING` block's
    "TC003",   # /
    "TC006",   # Add quotes to type expression in `typing.cast()`
]

[lint.per-file-ignores]
"benchmark/**.py" = [
    "INP001", # Check for packages that are missing an __init__.py file.
]
"tests/**.py" = [
    "DOC",     # Docstring's
    ########
    "S101",    # Check for uses of the assert keyword.
    "PLR2004", # Check for the use of unnamed numerical constants ("magic") values in comparisons.
]

[lint.mccabe]
# https://docs.astral.sh/ruff/settings/#lint_mccabe_max-complexity
max-complexity = 15

[lint.pycodestyle]
# E501 reports lines that exceed the length of 100.
max-line-length = 320

[lint.flake8-tidy-imports.banned-api]
"contextlib.suppress" = { msg = "Use `try-except-pass` instead" }
"__future__.annotations" = { msg = "Directly quote annotations instead" }